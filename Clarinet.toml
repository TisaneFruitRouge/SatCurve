[project]
name = "satcurve"
description = "Fixed-rate lending and zero-coupon bonds on Stacks L2"
authors = []
telemetry = false
cache_dir = "./.cache"

# No external requirements -- sbtc-token is a local devnet/simnet mock.
requirements = []

[contracts.sbtc-token]
path = "contracts/sbtc-token.clar"
clarity_version = 3
epoch = "3.0"

[contracts.bond-factory]
path = "contracts/bond-factory.clar"
clarity_version = 2
epoch = "3.0"

[contracts.yield-oracle]
path = "contracts/yield-oracle.clar"
clarity_version = 2
epoch = "3.0"

[contracts.market]
path = "contracts/market.clar"
clarity_version = 2
epoch = "3.0"
