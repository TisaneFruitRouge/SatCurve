name: Deploy to Testnet

on:
  push:
    branches:
      - master

env:
  NODE_VERSION: '20'
  CLARINET_VERSION: '3.14.0'

jobs:
  # ─── Job 1: detect whether contracts changed ─────────────────────────────
  check-contracts:
    name: Check contract changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - 'Clarinet.toml'
              - 'deployments/**'

  # ─── Job 2: deploy Clarity contracts to Stacks Testnet ───────────────────
  deploy-contracts:
    name: Deploy contracts
    needs: check-contracts
    if: needs.check-contracts.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet ${{ env.CLARINET_VERSION }}
        run: |
          curl -fsSL \
            "https://github.com/hirosystems/clarinet/releases/download/v${CLARINET_VERSION}/clarinet-linux-x64-glibc.tar.gz" \
            | tar -xz
          chmod +x ./clarinet
          sudo mv ./clarinet /usr/local/bin/clarinet
          clarinet --version

      - name: Inject deployer mnemonic into Testnet.toml
        run: |
          sed -i \
            's|mnemonic = ".*"|mnemonic = "${{ secrets.TESTNET_DEPLOYER_MNEMONIC }}"|' \
            settings/Testnet.toml

      - name: Deploy contracts
        run: |
          clarinet deployments apply \
            --testnet \
            --deployment-plan-path deployments/default.testnet-plan.yaml \
            --no-dashboard

  # ─── Job 3: build & deploy web app to Vercel ─────────────────────────────
  deploy-web:
    name: Deploy web to Vercel
    needs: deploy-contracts
    # Run even if deploy-contracts was skipped (no contract changes)
    if: |
      always() &&
      (needs.deploy-contracts.result == 'success' ||
       needs.deploy-contracts.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @satcurve/web build
        env:
          VITE_STACKS_NETWORK: testnet
          VITE_BOND_FACTORY_ADDRESS: ${{ secrets.TESTNET_DEPLOYER_ADDRESS }}.bond-factory
          VITE_YIELD_ORACLE_ADDRESS: ${{ secrets.TESTNET_DEPLOYER_ADDRESS }}.yield-oracle
          VITE_MARKET_ADDRESS: ${{ secrets.TESTNET_DEPLOYER_ADDRESS }}.market
          VITE_SBTC_TOKEN_ADDRESS: ${{ secrets.TESTNET_DEPLOYER_ADDRESS }}.sbtc-token

      - name: Deploy to Vercel
        run: pnpm dlx vercel --cwd apps/web --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── Job 4: deploy relayer bot to Railway ────────────────────────────────
  deploy-bot:
    name: Deploy bot to Railway
    needs: deploy-contracts
    if: |
      always() &&
      (needs.deploy-contracts.result == 'success' ||
       needs.deploy-contracts.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy bot
        working-directory: apps/bot
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
