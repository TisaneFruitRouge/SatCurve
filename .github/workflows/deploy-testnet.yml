name: Deploy to Testnet

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_contracts:
        description: 'Force contract redeployment even if no changes'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  CLARINET_VERSION: '3.14.0'

jobs:
  # ─── Job 1: detect whether contracts changed ─────────────────────────────
  check-contracts:
    name: Check contract changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.result.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - 'Clarinet.toml'
              - 'deployments/**'

      - name: Resolve changed output
        id: result
        run: |
          if [ "${{ inputs.force_contracts }}" = "true" ]; then
            echo "Force deploy requested"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=${{ steps.filter.outputs.contracts }}" >> $GITHUB_OUTPUT
          fi

  # ─── Job 2: deploy Clarity contracts to Stacks Testnet ───────────────────
  deploy-contracts:
    name: Deploy contracts
    needs: check-contracts
    if: needs.check-contracts.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet ${{ env.CLARINET_VERSION }}
        run: |
          curl -fsSL \
            "https://github.com/hirosystems/clarinet/releases/download/v${CLARINET_VERSION}/clarinet-linux-x64-glibc.tar.gz" \
            | tar -xz
          chmod +x ./clarinet
          sudo mv ./clarinet /usr/local/bin/clarinet
          clarinet --version

      - name: Inject deployer mnemonic into Testnet.toml
        run: |
          sed -i \
            's|mnemonic = ".*"|mnemonic = "${{ secrets.TESTNET_DEPLOYER_MNEMONIC }}"|' \
            settings/Testnet.toml

      - name: Deploy contracts
        run: |
          clarinet deployments apply \
            --testnet \
            --deployment-plan-path deployments/default.testnet-plan.yaml \
            --no-dashboard

  # ─── Job 3: deploy web app to Railway ────────────────────────────────────
  deploy-web:
    name: Deploy web to Railway
    needs: deploy-contracts
    if: |
      always() &&
      (needs.deploy-contracts.result == 'success' ||
       needs.deploy-contracts.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy web
        run: railway up --service "@satcurve/web" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Job 4: deploy relayer bot to Railway ────────────────────────────────
  deploy-bot:
    name: Deploy bot to Railway
    needs: deploy-contracts
    if: |
      always() &&
      (needs.deploy-contracts.result == 'success' ||
       needs.deploy-contracts.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy bot
        run: railway up --service "@satcurve/bot" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
